<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AgriSmart Bot - Market Prices</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<h1>📈 Market Price Dashboard</h1>
</header>

<div class="market-container">

<h2>Select Crop</h2>

<select id="cropSelect" onchange="updateChart()">

<option value="cotton">Cotton</option>

<option value="wheat">Wheat</option>

<option value="rice">Rice</option>

<option value="groundnut">Groundnut</option>

</select>

<div class="stats">

<div class="stat-card">
<h3>Today's Price</h3>
<p id="todayPrice">₹7600</p>
</div>

<div class="stat-card">
<h3>Highest</h3>
<p id="highPrice">₹7600</p>
</div>

<div class="stat-card">
<h3>Lowest</h3>
<p id="lowPrice">₹7200</p>
</div>

</div>

<canvas id="priceChart"></canvas>

</div>

<script>

const marketData = {

cotton:[7200,7300,7250,7400,7500,7600,7550],

wheat:[2200,2250,2300,2280,2350,2400,2380],

rice:[3000,3050,3020,3100,3150,3200,3180],

groundnut:[5000,5100,5200,5150,5300,5400,5350]

};

const labels = [
"Mon",
"Tue",
"Wed",
"Thu",
"Fri",
"Sat",
"Sun"
];

const ctx =
document.getElementById("priceChart");

let chart = new Chart(ctx, {

type:"line",

data:{
labels:labels,

datasets:[{
label:"Cotton Price",
data:marketData.cotton,
borderWidth:3
}]
},

options:{
responsive:true
}

});

function updateChart(){

let crop =
document.getElementById("cropSelect").value;

let prices =
marketData[crop];

chart.data.datasets[0].data =
prices;

chart.data.datasets[0].label =
crop.toUpperCase()+" Price";

chart.update();

document.getElementById("todayPrice")
.innerHTML =
"₹"+prices[prices.length-1];

document.getElementById("highPrice")
.innerHTML =
"₹"+Math.max(...prices);

document.getElementById("lowPrice")
.innerHTML =
"₹"+Math.min(...prices);

}

</script>

</body>
</html>
