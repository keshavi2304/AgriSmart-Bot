<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriSmart Bot - AI Chatbot</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🤖 AgriSmart AI Chatbot</h1>
</header>

<div class="search-container">

    <textarea id="userQuestion"
    placeholder="Ask a farming question..."
    rows="5"></textarea>

    <button onclick="askBot()">
        Ask AI
    </button>

    <div id="chatResult"></div>

</div>

<script>

function askBot(){

let question =
document.getElementById("userQuestion")
.value
.toLowerCase();

let answer =
"Sorry, I don't know that answer yet.";

if(question.includes("fertilizer")){
answer =
"Organic fertilizer improves soil health and crop growth.";
}

else if(question.includes("water")){
answer =
"Most crops need regular watering, but avoid overwatering.";
}

else if(question.includes("cotton")){
answer =
"Cotton grows best in warm climates with moderate rainfall.";
}

else if(question.includes("wheat")){
answer =
"Wheat is generally sown from October to December.";
}

document.getElementById("chatResult").innerHTML =
`
<div class="info-card">
<h2>AI Response</h2>
<p>${answer}</p>
</div>
`;

}

</script>

</body>
</html>
