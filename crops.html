<html>
<head>
<meta charset="UTF-8">
<title>Fruits & Vegetables Information</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🍎 Fruits & Vegetables Information</h1>
</header>

<div class="search-container">

    <input type="text" id="cropInput"
    placeholder="Enter fruit or vegetable name">

    <button onclick="searchCrop()">Search</button>

    <div id="result"></div>

</div>

<script>

},

},

benefits:"Good for digestion and heart health",

},

},

},

},

},

type:"Fruit",
season:"Winter",
nutrition:"Vitamin C, Fiber",
benefits:"Improves immunity",
farming:"Grows in tropical regions"
},

pomegranate:{
type:"Fruit",
season:"Autumn",
nutrition:"Iron, Antioxidants",
benefits:"Supports blood health",

},

},

},

},

farming:"Requires cool weather"
},

type:"Vegetable",

benefits:"Good for blood health",
farming:"Needs fertile soil"
},

cucumber:{
type:"Vegetable",
season:"Summer",

benefits:"Keeps body hydrated",
farming:"Needs warm climate"
},

beetroot:{
type:"Vegetable",

farming:"Requires fertile soil"
},

function searchCrop(){

let name =
document.getElementById("cropInput")
.value.toLowerCase().trim();

let crop = crops[name];

if(crop){

document.getElementById("result").innerHTML =

`
<div class="info-card">

<h2>${name.toUpperCase()}</h2>

<p><b>Type:</b> ${crop.type}</p>

<p><b>Season:</b> ${crop.season}</p>

<p><b>Nutrition:</b> ${crop.nutrition}</p>

<p><b>Benefits:</b> ${crop.benefits}</p>

<p><b>Farming Info:</b> ${crop.farming}</p>

</div>
`;

}else{

document.getElementById("result").innerHTML =

`
<div class="info-card">
<h3>❌ Information Not Available</h3>
<p>Please try another fruit or vegetable.</p>
</div>
`;

}

}

</script>

</body>
</html>
